version: '3.8'

services:
  scraper:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile
    container_name: ecommerce-scraper
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_STORAGE_BUCKET=${GCP_STORAGE_BUCKET}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-credentials.json
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./credentials:/app/credentials:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Add a monitoring container
  monitoring:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile
    container_name: ecommerce-monitoring
    environment:
      - MODE=monitoring
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs:ro
      - ./reports:/app/reports
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      - scraper

volumes:
  data:
  logs:
  reports:
  credentials: